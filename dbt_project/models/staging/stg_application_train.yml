version: 2

models:
    - name: stg_application_train
      columns:
        - name: member_id
          tests:
            - not_null
            - unique

        - name: contract_type
          tests:
            - not_null
            - accepted_values:
                values: ['Cash loans', 'Revolving loans']

        - name: gender
          tests: 
            - not_null
            - accepted_values:
                values: ['M', 'F', 'XNA']

        - name: own_car
          tests:
            - not_null
            - accepted_values:
                values: ['Y', 'N']

        - name: own_realty
          tests:
            - not_null
            - accepted_values:
                values: ['Y', 'N']

        - name: num_children
          tests: 
            - not_null
            - positive_values

        - name: annual_income
          tests:
            - not_null
            - positive_values

        - name: total_loan_amount
          tests:
            - not_null
            - positive_values

        - name: monthly_loan_amount
          tests:
            - not_null
            - positive_values

        - name: goods_price
          tests: 
            - not_null
            - positive_values
        
        - name: job_type
          tests:
            - not_null
            - accepted_values:
                values: ['Working', 'Commercial associate', 'Pensioner', 'State servant', 'Unemployed', 'Student', 'Businessman', 'Maternity leave']

        - name: education_type
          tests: 
            - not_null
            - accepted_values:
                values: ['Secondary / secondary special', 'Higher education', 'Incomplete higher', 'Lower secondary', 'Academic degree']

        - name: housing_type
          tests:
            - not_null
            - accepted_values:
                values: ['House / apartment', 'With parents', 'Municipal apartment', 'Rented apartment', 'Office apartment', 'Co-op apartment']
        
        - name: age_day_application
          tests:
            - not_null
            - negative_values

        - name: days_id_changed
          tests:
            - not_null
            - negative_values

        - name: num_family_members
          tests:
            - not_null
            - positive_values

        - name: region_rating_city
          tests:
            - not_null
            - accepted_values:
                values: [1, 2, 3]
        
        - name: organization_type
          tests:
            - not_null

        - name: avg_external_sources
          tests:
            - not_null
            - normalize
        
        - name: days_last_phone_change
          tests: 
            - not_null
            - negative_values

        - name: target
          tests:
            - not_null
            - accepted_values:
                values: [0, 1]